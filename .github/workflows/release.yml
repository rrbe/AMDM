name: Release

# 打 tag 触发：给某个 commit 打上 vX.Y.Z 形式的 tag 并 push 到远端后，
# 在 macOS / Windows / Linux 三个 runner 上分别打包，再汇总创建一个
# GitHub Release，把安装包作为附件挂上去。
#
# 平台产物由 electron-builder.yml 决定:
#   macOS   -> .dmg + .zip (arm64)
#   Windows -> .exe (NSIS, x64)
#   Linux   -> .AppImage
#
# 版本号以 package.json 为真相源(发版前用 `pnpm version` bump 并打 tag),
# 这里只校验 tag 与之一致。质量闸门(typecheck + 单测)由 ci.yml 单独跑。
on:
  push:
    tags:
      - 'v*'

# 同一个 tag 不重复并发跑;但不取消已在跑的(打包很贵,跑完更划算)。
concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            platform: mac
            name: macos
          - os: windows-latest
            platform: win
            name: windows
          - os: ubuntu-latest
            platform: linux
            name: linux
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      # 不写 version——pnpm/action-setup 从 package.json 的 packageManager 字段读取
      # (单一真相源)。两处都写会报错。与 ci.yml 保持一致。
      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      # onlyBuiltDependencies 放行了 electron + esbuild,这里需要它们的二进制来打包。
      # mongodb-memory-server 的 postinstall 仍被拦截(不会联网下载 mongod)。
      - name: Install
        run: pnpm install --frozen-lockfile

      # 强约束:tag(去掉前导 v)必须等于 package.json 的 version,否则产物版本会与
      # Release tag 漂移。漂移时直接快速失败,提示用 `pnpm version` 先 bump。
      - name: Verify tag matches package.json version
        shell: bash
        run: |
          PKG=$(node -p "require('./package.json').version")
          TAG="${GITHUB_REF_NAME#v}"
          echo "package.json=$PKG  tag=$TAG"
          if [ "$PKG" != "$TAG" ]; then
            echo "::error::Git tag v$TAG 与 package.json 版本 $PKG 不一致;请先 \`pnpm version\` 再打 tag。"
            exit 1
          fi

      # 直接调用,不经 `pnpm run dist:* -- ...`——后者会把字面 `--` 透传给
      # electron-builder,导致其后的 --publish never 被当成位置参数而失效。
      # --publish never:这里只产包,统一在 release job 里发布(否则 electron-builder
      # 在 CI+tag 环境下会默认尝试自动发布,进而索要 GH_TOKEN 而失败)。
      - name: Build & package
        shell: bash
        env:
          # CI 上没有 Apple 签名证书——跳过签名而不是报错失败。
          CSC_IDENTITY_AUTO_DISCOVERY: false
        run: |
          pnpm run build
          pnpm exec electron-builder --${{ matrix.platform }} --publish never

      # 只上传面向用户的安装包,不传体积巨大的 unpacked 目录。
      # 每个平台只命中自己那几个 glob,未命中的 glob 自动忽略。
      - name: Upload installers
        uses: actions/upload-artifact@v4
        with:
          name: dist-${{ matrix.name }}
          if-no-files-found: error
          path: |
            dist/*.dmg
            dist/*.zip
            dist/*.exe
            dist/*.AppImage

  release:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write   # 创建 Release / 上传附件需要写权限
    steps:
      - name: Download all installers
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true   # 三个 job 的产物拍平到 artifacts/ 下

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          draft: false
          # tag 里带 "-"(如 v0.2.0-beta.1)视为预发布。
          prerelease: ${{ contains(github.ref_name, '-') }}
          generate_release_notes: true   # 按提交自动生成 changelog
          fail_on_unmatched_files: true
          files: artifacts/**/*
