    <clipPath id="squircle"><rect x="100" y="100" width="824" height="824" rx="184" ry="184"/></clipPath>
  </defs>
  <g clip-path="url(#squircle)">
    <rect x="100" y="100" width="824" height="824" fill="#0E1F17"/>
    <!-- left brace { -->
    <path d="M432 330 L398 330 L398 488 L356 512 L398 536 L398 694 L432 694"
